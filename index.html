<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コミュニケーションタイプ診断</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .question {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question p {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .options label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #2980b9;
        }

        /* 結果表示エリアのスタイル */
        #result-container {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #e8f6f3;
            border-radius: 8px;
            margin-top: 20px;
        }
        #result-image {
            max-width: 280px;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #result-title {
            font-size: 22px;
            color: #16a085;
            margin-bottom: 10px;
        }
        #result-desc {
            font-size: 16px;
            margin-bottom: 30px;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }

        /* SNSシェアボタンのスタイル */
        .share-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #bdc3c7;
        }
        .share-section p {
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .share-btn {
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .share-btn:hover {
            opacity: 0.8;
        }
        .share-x { background-color: #000000; }
        .share-line { background-color: #06C755; }
        .share-fb { background-color: #1877F2; }

        /* QRコードのスタイル */
        .qr-container {
            margin-top: 30px;
        }
        .qr-container img {
            max-width: 150px;
            border: 1px solid #ddd;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💬 コミュニケーションタイプ診断</h1>

    <div id="quiz-container">
        <p style="text-align: center; margin-bottom: 30px;">直感で、自分に最も当てはまるものを選んでください。</p>
        <p id="error-msg" class="error">すべての質問に回答してください。</p>

        <form id="quiz-form">
            <div class="question">
                <p>Q1. 自分の意見や考えを、はっきりと相手に伝えられる。</p>
                <div class="options">
                    <label><input type="radio" name="q1" value="3"> よく当てはまる</label>
                    <label><input type="radio" name="q1" value="2"> どちらかといえば当てはまる</label>
                    <label><input type="radio" name="q1" value="1"> あまり当てはまらない</label>
                </div>
            </div>

            <div class="question">
                <p>Q2. 相手の話を最後まで遮らずに聞くことができる。</p>
                <div class="options">
                    <label><input type="radio" name="q2" value="3"> よく当てはまる</label>
                    <label><input type="radio" name="q2" value="2"> どちらかといえば当てはまる</label>
                    <label><input type="radio" name="q2" value="1"> あまり当てはまらない</label>
                </div>
            </div>

            <div class="question">
                <p>Q3. 初対面の人と話すのは得意な方だ。</p>
                <div class="options">
                    <label><input type="radio" name="q3" value="3"> よく当てはまる</label>
                    <label><input type="radio" name="q3" value="2"> どちらかといえば当てはまる</label>
                    <label><input type="radio" name="q3" value="1"> あまり当てはまらない</label>
                </div>
            </div>

            <button type="button" onclick="calculateResult()">診断結果を見る</button>
        </form>
    </div>

    <div id="result-container">
        <img id="result-image" src="" alt="診断結果タイプ画像">
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>

        <div class="share-section">
            <p>＼ 結果をみんなにシェアしよう！ ／</p>

            <div class="share-buttons">
                <a href="#" id="share-x" class="share-btn share-x" target="_blank" rel="noopener noreferrer">𝕏 でシェア</a>
                <a href="#" id="share-line" class="share-btn share-line" target="_blank" rel="noopener noreferrer">LINE で送る</a>
                <a href="#" id="share-fb" class="share-btn share-fb" target="_blank" rel="noopener noreferrer">Facebook</a>
            </div>

            <div class="qr-container">
                <p style="font-size: 14px; margin-bottom: 10px;">スマホからアクセス・シェアする</p>
                <img src="QR.png" alt="サイトのQRコード" id="qr-image" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://example.com'; this.onerror=null;">
            </div>
        </div>

        <button onclick="location.reload()" style="margin-top: 30px;">もう一度診断する</button>
    </div>
</div>

<script>
    // スコア（3〜9点）→ 8タイプへのマッピング
    // 各タイプの画像ファイルはルート直下に配置してください
    const RESULT_TYPES = {
        3: {
            title: '🌱 慎重なリスナータイプ',
            desc: '控えめで慎重なコミュニケーションをとるタイプです。相手の顔色をうかがいすぎて、言いたいことが言えないことがあるかもしれません。',
            image: 'image/type_pyon_usagi.png'
        },
        4: {
            title: '🐧 ちからもちペンギンタイプ',
            desc: '気づきと気配りで人を支える縁の下の力持ちタイプ。頼られることが多い存在です。',
            image: 'image/type_chikaramochi_penguin.png'
        },
        5: {
            title: '🤝 協調性あふれるサポータータイプ',
            desc: '周囲との調和を大切にするタイプです。相手の話を聞くのは得意ですが、時には自分の意見を少し抑え込んでしまうことがあるかもしれません。',
            image: 'image/type_shitsuji_hitsuji.png'
        },
        6: {
            title: '🐿 もくもくリスタイプ',
            desc: '目標に向かって努力を続ける実行力タイプ。一歩ずつ関係を築きます。',
            image: 'image/type_mokumoku_risu.png'
        },
        7: {
            title: '🐹 はりきりハリネズミタイプ',
            desc: '新しいことや人との出会いを楽しめる冒険家タイプ。好奇心があなたの原動力です。',
            image: 'image/type_harikiri_harinezumi.png'
        },
        8: {
            title: '🦦 太陽カワウソタイプ',
            desc: '場の空気を明るくする天才。誰とでもすぐ打ち解けられるムードメーカータイプ。',
            image: 'image/type_taiyo_kawauso.png'
        },
        9: {
            title: '✨ バランスの取れた達人タイプ',
            desc: '自己主張と傾聴のバランスが非常に取れています。相手の気持ちを尊重しながら、自分の意見もしっかりと伝えられるため、周囲から高い信頼を得ているでしょう。',
            image: 'image/type_peaceful_dolphin.png'
        }
    };

    function calculateResult() {
        const form = document.getElementById('quiz-form');
        const formData = new FormData(form);
        let totalScore = 0;
        let answeredQuestions = 0;

        const questionCount = 3;

        for (let i = 1; i <= questionCount; i++) {
            const answer = formData.get('q' + i);
            if (answer) {
                totalScore += parseInt(answer);
                answeredQuestions++;
            }
        }

        const errorMsg = document.getElementById('error-msg');

        if (answeredQuestions < questionCount) {
            errorMsg.style.display = 'block';
            return;
        } else {
            errorMsg.style.display = 'none';
        }

        const result = RESULT_TYPES[totalScore] || RESULT_TYPES[5];
        const title = result.title;
        const desc = result.desc;

        // --- SNSシェア用の設定 ---
        // ※ 本番環境に公開した際、このURLを実際のサイトURLに変更してください
        const siteUrl = "https://example.com";

        // シェアされるテキスト（診断結果のタイトルが自動で入ります）
        const shareText = `私のコミュニケーションタイプは「${title}」でした！\nみんなも診断してみよう👇\n`;

        // URLエンコード（日本語や記号を正しくURLに乗せるための処理）
        const encodedText = encodeURIComponent(shareText);
        const encodedUrl = encodeURIComponent(siteUrl);

        // 各ボタンのリンク先（href）を動的に書き換え
        document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`;
        document.getElementById('share-line').href = `https://line.me/R/msg/text/?${encodedText}%20${encodedUrl}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;

        // 表示の切り替え
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-image').src = result.image;
        document.getElementById('result-title').textContent = title;
        document.getElementById('result-desc').textContent = desc;
        document.getElementById('result-container').style.display = 'block';
    }
</script>

</body>
</html>
